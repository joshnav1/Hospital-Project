server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # SPA — serve index.html for all non-asset paths
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy API calls to the FastAPI backend service
    # Matches /triage, /triage/stream, /report/*, /escalate, /escalate/*, /health
    location ~ ^/(triage|report|escalate|health) {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        # SSE / streaming — disable buffering so chunks reach the browser immediately
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 300s;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
    }
}